<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UCSD Volleyball Analytics AI</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      /* REQUIRED so height actually fills correctly */
      html, body, #root {
        min-height: 100%;
      }

      /* Scaling */
      #root {
        transform: scale(0.8);
        transform-origin: top left;

        width: calc(100vw / 0.8);
        height: calc(100vh / 0.8);
      }


    </style>
    <script src="https://js.puter.com/v2/"></script>
    <script type="module">
      // Import Neon serverless driver
      import { neon } from 'https://esm.sh/@neondatabase/serverless@0.9.0';
      window.neon = neon;
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
